<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berkay Öztürk | Dijital Portfolyo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <nav class="ana-navigasyon">
        <div class="konteyner">
            <div class="logo">B.<span>BERKAY</span></div>
            <ul class="nav-linkler">
                <li><a href="#hakkimda">Hakkımda</a></li>
                <li><a href="#yetenekler">Yetenekler</a></li>
                <li><a href="#projeler">Projeler</a></li>
            </ul>
            <button id="tema-degistir" class="tema-btn"><i class="fas fa-moon"></i></button>
        </div>
    </nav>

    <header id="hakkimda" class="hero-bolumu">
        <div class="konteyner grid-yapisi">
            <div class="hero-metin">
                <h1 id="daktilo-hedef"></h1>
                <p>Eğitim: Bilgisayar Programcılığı. Kariyer Hedefi: Full-Stack Geliştirici olmak.</p>
                <div class="iletisim-ikonlar">
                    <a href="https://github.com/LuckyTakens" target="_blank"><i class="fab fa-github"></i></a>
                    <a href="mailto:berkay@email.com"><i class="fas fa-envelope"></i></a>
                </div>
            </div>
            <div class="hero-gorsel">
                <div class="gorsel-cerceve">
                    <img src="./profil.jpg" alt="Berkay Öztürk" class="ana-profil-foto">
                </div>
            </div>
        </div>
    </header>

    <section id="yetenekler" class="bolum">
        <div class="konteyner">
            <h2 class="bolum-basligi">Yetenekler ve Eğitim</h2>
            <p>Aldığım Dersler: İnternet Programcılığı 1, Veritabanı, Algoritma.</p>
            <div class="yetenek-alani">
                <span>HTML/CSS</span>
                <div class="bar-dis"><div class="bar-ic" style="width: 90%;"></div></div>
                <span>JavaScript</span>
                <div class="bar-dis"><div class="bar-ic" style="width: 75%;"></div></div>
            </div>
        </div>
    </section>

    <section id="projeler" class="bolum">
        <div class="konteyner">
            <h2 class="bolum-basligi">Proje Galerisi</h2>
            <div class="filtre-butonlari">
                <button onclick="projeFiltrele('hepsi')" class="filtre-btn">Hepsi</button>
                <button onclick="projeFiltrele('Web')" class="filtre-btn">Web</button>
                <button onclick="projeFiltrele('Mobil')" class="filtre-btn">Mobil</button>
            </div>
            <div id="proje-kutusu" class="proje-galerisi"></div>
        </div>
    </section>

    <script src="./script.js"></script>
</body>
</html>
